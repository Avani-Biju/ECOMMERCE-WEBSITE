<div class="container mt-4">

  <div class="row">

    <!-- Left Side: Form -->
    <div class="col-md-6">
      <h3>Contact Us</h3>

      <form>

        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" placeholder="Enter your name">
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" placeholder="Enter your email">
        </div>

        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea class="form-control" rows="5" placeholder="Your message"></textarea>
        </div>

        <button class="btn btn-primary">Send Message</button>

      </form>
    </div>

    <!-- Right Side: Map -->
    <div class="col-md-6">
      <h3>Our Location</h3>

      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d423284.6900025512!2d-118.41173260000001!3d34.020478950000005!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80c2c75ddc27da13%3A0xe22fdf6f254608f4!2sLos%20Angeles%2C%20CA%2C%20USA!5e0!3m2!1sen!2sin!4v1781727342848!5m2!1sen!2sin"
        width="100%"
        height="350"
        style="border:0;"
        loading="lazy">
      </iframe>

    </div>

  </div>

</div>
